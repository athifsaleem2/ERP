<div class="max-w-4xl mx-auto p-3">
  <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-xl">
    <!-- Header -->
    <div class="bg-gradient-to-r from-slate-800 to-indigo-950 text-white px-8 py-5 flex justify-between items-center relative overflow-hidden">
      <div class="absolute top-0 right-0 -mr-16 -mt-16 w-48 h-48 rounded-full bg-white opacity-5 blur-2xl"></div>
      <div class="relative z-10">
        <h2 class="text-xl font-bold tracking-tight mb-1">Add New Supplier</h2>
        <p class="text-slate-300 text-xs font-medium tracking-wide">Register a new vendor for your procurement loop</p>
      </div>
      <button (click)="cancel()" class="text-slate-300 hover:text-white transition-colors">
        <i class="bi bi-x-lg text-lg"></i>
      </button>
    </div>

    <!-- Form Body -->
    <form (ngSubmit)="onSubmit()" #supplierForm="ngForm" class="p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Name -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">Supplier Name *</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <i class="bi bi-building"></i>
            </span>
            <input type="text" name="name" [(ngModel)]="supplier.name" required
              class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
              placeholder="Enter company name">
          </div>
        </div>

        <!-- Contact Person -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">Contact Person</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" name="contactPerson" [(ngModel)]="supplier.contactPerson"
              class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
              placeholder="Full name">
          </div>
        </div>

        <!-- Phone -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">Phone Number *</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <i class="bi bi-telephone"></i>
            </span>
            <input type="text" name="phone" [(ngModel)]="supplier.phone" required
              class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
              placeholder="+91 XXXXX XXXXX">
          </div>
        </div>

        <!-- Email -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" name="email" [(ngModel)]="supplier.email"
              class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
              placeholder="vendor@company.com">
          </div>
        </div>

        <!-- GST Number -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">GST Number</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
              <i class="bi bi-hash"></i>
            </span>
            <input type="text" name="gstNumber" [(ngModel)]="supplier.gstNumber"
              class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none"
              placeholder="Ex: 22AAAAA0000A1Z5">
          </div>
        </div>

        <!-- Address -->
        <div class="md:col-span-2 space-y-2">
          <label class="block text-xs font-bold text-gray-700 uppercase tracking-wider">Full Address</label>
          <textarea name="address" [(ngModel)]="supplier.address" rows="3"
            class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none resize-none"
            placeholder="Complete registration address"></textarea>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="mt-8 flex justify-end gap-3 border-t border-gray-100 pt-6">
        <button type="button" (click)="cancel()"
          class="px-6 py-2 border border-gray-300 text-gray-600 rounded-lg text-xs font-bold hover:bg-gray-50 transition-all">
          Cancel
        </button>
        <button type="submit" [disabled]="isSubmitting"
          class="px-8 py-2 bg-gradient-to-r from-indigo-600 to-indigo-800 text-white rounded-lg text-xs font-bold hover:from-indigo-700 hover:to-indigo-900 transition-all shadow-lg flex items-center gap-2">
          <span *ngIf="isSubmitting" class="animate-spin border-2 border-white/30 border-t-white rounded-full w-3 h-3"></span>
          {{ isSubmitting ? 'Saving...' : 'Save Supplier' }}
        </button>
      </div>
    </form>
  </div>
</div>
