<div class="invoice-container card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Purchase Invoice</h5>
      <small class="opacity-75">Enterprise ERP System</small>
    </div>
    <div class="text-end small">
      <div class="fw-semibold">Invoice #: PINV-001</div>
      <div>Date: {{ today | date:'dd-MM-yyyy' }}</div>
    </div>
  </div>

  <div class="card-body p-4 small">

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Supplier</label>
        <select class="form-select form-select-sm">
          <option>Select Supplier</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Bill No</label>
        <input type="text" class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Due Date</label>
        <input type="date" class="form-control form-control-sm">
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead class="table-light">
          <tr class="text-uppercase small">
            <th width="35%">Product</th>
            <th width="10%" class="text-end">Qty</th>
            <th width="15%" class="text-end">Cost</th>
            <th width="15%" class="text-end">Tax %</th>
            <th width="15%" class="text-end">Total</th>
            <th width="10%"></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="text" class="form-control form-control-sm"></td>
            <td><input type="number" class="form-control form-control-sm text-end"></td>
            <td><input type="number" class="form-control form-control-sm text-end"></td>
            <td><input type="number" class="form-control form-control-sm text-end"></td>
            <td class="text-end fw-semibold">0.00</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-secondary">✕</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
