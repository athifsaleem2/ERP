<div class="invoice-container card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between">
    <h5 class="mb-0">Bank Transactions</h5>
    <small>{{ today | date:'dd-MM-yyyy' }}</small>
  </div>

  <div class="card-body p-4 small">

    <table class="table table-sm table-hover">
      <thead class="table-light">
        <tr>
          <th>Date</th>
          <th>Bank</th>
          <th>Type</th>
          <th class="text-end">Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of transactions">
          <td>{{ t.date }}</td>
          <td>{{ t.bank }}</td>
          <td>{{ t.type }}</td>
          <td class="text-end">{{ t.amount }}</td>
          <td>{{ t.status }}</td>
        </tr>
      </tbody>
    </table>

  </div>
</div>
