<div class="invoice-container card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3">
    <h5 class="mb-0">Expense Entry</h5>
  </div>

  <div class="card-body p-4 small">

    <div class="row g-3">

      <div class="col-md-4">
        <label class="form-label fw-semibold">Expense Category</label>
        <input class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold">Amount</label>
        <input type="number" class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold">Payment Mode</label>
        <select class="form-select form-select-sm">
          <option>Cash</option>
          <option>Bank</option>
          <option>Card</option>
        </select>
      </div>

    </div>

    <div class="mt-4 text-end">
      <button class="btn btn-sm btn-success">Save Expense</button>
    </div>

  </div>
</div>
