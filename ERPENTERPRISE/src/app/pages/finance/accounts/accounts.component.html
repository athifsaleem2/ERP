<div class="invoice-container card shadow-sm border-0">

  <!-- HEADER -->
  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Accounts Management</h5>
      <small class="opacity-75">Enterprise ERP - Finance Module</small>
    </div>
    <div class="text-end small">
      <div>Date: {{ today | date:'dd-MM-yyyy' }}</div>
    </div>
  </div>

  <div class="card-body p-4 small">

    <!-- FORM -->
    <div class="row g-3 mb-4">

      <div class="col-md-4">
        <label class="form-label fw-semibold">Account Name</label>
        <input type="text" class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold">Account Type</label>
        <select class="form-select form-select-sm">
          <option>Asset</option>
          <option>Liability</option>
          <option>Income</option>
          <option>Expense</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold">Opening Balance</label>
        <input type="number" class="form-control form-control-sm">
      </div>

    </div>

    <!-- TABLE -->
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead class="table-light">
          <tr class="text-uppercase small">
            <th>Account</th>
            <th>Type</th>
            <th class="text-end">Balance</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Cash Account</td>
            <td>Asset</td>
            <td class="text-end">₹ 0.00</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- BUTTON -->
    <div class="mt-4 text-end">
      <button class="btn btn-sm btn-success">Save Account</button>
    </div>

  </div>
</div>
