<div class="hrms-container">
  <div class="hrms-header">
    <div>
      <h4 class="hrms-title"><i class="bi bi-send-plus me-2"></i>Apply for Leave</h4>
      <span class="hrms-sub">HRMS Module &mdash; {{ today | date:'dd MMM yyyy' }}</span>
    </div>
    <button class="btn-secondary" (click)="cancel()">← Back</button>
  </div>

  <div *ngIf="successMsg" class="alert-success-bar">✔ {{ successMsg }}</div>
  <div *ngIf="errorMsg" class="alert-error-bar">✘ {{ errorMsg }}</div>

  <div class="form-card">
    <h6 class="section-label">Leave Request Details</h6>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="field-label">Employee *</label>
        <select id="leave-emp" class="field-input" [(ngModel)]="form.employeeId">
          <option [value]="0">-- Select Employee --</option>
          <option *ngFor="let e of employees" [value]="e.id">{{ e.name }} ({{ e.empCode }})</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="field-label">Leave Type *</label>
        <select id="leave-type" class="field-input" [(ngModel)]="form.leaveType">
          <option *ngFor="let t of leaveTypes" [value]="t">{{ t }}</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="field-label">From Date *</label>
        <input id="leave-from" type="date" class="field-input" [(ngModel)]="form.fromDate" (ngModelChange)="computeDays()">
      </div>
      <div class="col-md-4">
        <label class="field-label">To Date *</label>
        <input id="leave-to" type="date" class="field-input" [(ngModel)]="form.toDate" (ngModelChange)="computeDays()">
      </div>
      <div class="col-md-4">
        <label class="field-label">Total Days</label>
        <input type="number" class="field-input readonly-field" [value]="form.totalDays" readonly>
      </div>
      <div class="col-12">
        <label class="field-label">Reason</label>
        <textarea id="leave-reason" class="field-input" rows="3" [(ngModel)]="form.reason" placeholder="Brief reason for leave…" style="resize:none"></textarea>
      </div>
      <div class="col-12 d-flex gap-2 justify-content-end">
        <button class="btn-secondary" (click)="cancel()">Cancel</button>
        <button id="btn-submit-leave" class="btn-save" (click)="save()" [disabled]="saving">
          {{ saving ? 'Submitting…' : 'Submit Leave Request' }}
        </button>
      </div>
    </div>
  </div>
</div>
