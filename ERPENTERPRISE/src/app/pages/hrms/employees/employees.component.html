<div class="card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Employee Management</h5>
      <small>Manage Employees</small>
    </div>

   <button
  class="btn btn-sm btn-light text-dark"
  (click)="addEmployee()">
  + Add Employee
</button>
  </div>

  <div class="card-body p-4 small">

    <div class="row g-3 mb-4">

      <div class="col-md-4">
        <input class="form-control form-control-sm" placeholder="Search Employee">
      </div>

      <div class="col-md-2">
        <button class="btn btn-sm btn-dark w-100">
          Search
        </button>
      </div>

      <div class="col-md-3">
        <select class="form-select form-select-sm">
          <option>All Employees</option>
          <option>Active</option>
          <option>Inactive</option>
        </select>
      </div>

    </div>

    <div class="table-responsive">

      <table class="table table-sm table-hover align-middle">

        <thead class="table-light">
          <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Phone</th>
            <th>Status</th>
            <th width="160" class="text-center">Action</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td class="fw-semibold">John Doe</td>
            <td>Sales</td>
            <td>9999999999</td>
            <td><span class="badge bg-success">Active</span></td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1">Edit</button>
              <button class="btn btn-sm btn-outline-danger">Delete</button>
            </td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
