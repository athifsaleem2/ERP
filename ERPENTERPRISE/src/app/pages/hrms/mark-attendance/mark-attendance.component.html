<div class="hrms-container">
  <div class="hrms-header">
    <div>
      <h4 class="hrms-title"><i class="bi bi-pencil-square me-2"></i>Mark Attendance</h4>
      <span class="hrms-sub">HRMS Module &mdash; {{ today | date:'dd MMM yyyy' }}</span>
    </div>
    <button class="btn-secondary" (click)="cancel()">← Back</button>
  </div>

  <div *ngIf="successMsg" class="alert-success-bar">✔ {{ successMsg }}</div>

  <div class="form-card">
    <div class="row g-3 align-items-end mb-3">
      <div class="col-md-3">
        <label class="field-label">Attendance Date *</label>
        <input id="mark-date" type="date" class="field-input" [(ngModel)]="attendanceDate">
      </div>
      <div class="col-md-auto d-flex gap-2">
        <button class="btn-quick btn-present" (click)="markAll('Present')">Mark All Present</button>
        <button class="btn-quick btn-absent" (click)="markAll('Absent')">Mark All Absent</button>
      </div>
    </div>
  </div>

  <div class="table-card">
    <div *ngIf="loading" class="loading-state">Loading employees…</div>

    <div *ngIf="!loading && rows.length > 0" class="table-responsive">
      <table class="hrms-table">
        <thead>
          <tr>
            <th>#</th><th>Employee Name</th><th>Status</th><th>Check In</th><th>Check Out</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of rows; let i = index">
            <td class="row-num">{{ i + 1 }}</td>
            <td class="fw-semibold">{{ r.employeeName }}</td>
            <td>
              <select class="field-input-sm" [(ngModel)]="r.status">
                <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
              </select>
            </td>
            <td><input type="time" class="field-input-sm" [(ngModel)]="r.checkIn"></td>
            <td><input type="time" class="field-input-sm" [(ngModel)]="r.checkOut"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="!loading" class="d-flex justify-content-end gap-2 mt-3">
      <button class="btn-secondary" (click)="cancel()">Cancel</button>
      <button id="btn-save-attendance" class="btn-save" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving…' : 'Save Attendance' }}
      </button>
    </div>
  </div>
</div>
