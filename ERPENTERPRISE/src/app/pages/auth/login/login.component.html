<div class="login-page">

  <div class="container-fluid h-100">
    <div class="row h-100 align-items-center justify-content-center">

      <!-- LEFT SIDE IMAGE -->
      <div class="col-lg-6 d-none d-lg-flex justify-content-center align-items-center">

        <div class="image-container">

          <img src="/photo-1554224155-6726b3ff858f.jpg" alt="Login Background" class="image-fit" />

          <div class="overlay"></div>

          <div class="image-text">
            <h2 class="fw-bold">ERP Enterprise</h2>
            <p class="small">Loan & Business Management System</p>
          </div>

        </div>

      </div>

      <!-- RIGHT SIDE LOGIN -->
      <div class="col-lg-4 col-md-6 col-11 d-flex justify-content-center">

        <div class="card shadow border-0 login-card">
          <div class="card-body p-4">

            <h5 class="fw-semibold mb-1">Sign In</h5>
            <p class="text-muted small mb-3">
              Welcome back! Please login.
            </p>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

              <!-- Username / Email -->
              <div class="mb-3">
                <label class="form-label small fw-medium">Username / Email</label>
                <input type="text" class="form-control custom-input" formControlName="email"
                  placeholder="Enter username or email">
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label class="form-label small fw-medium">Password</label>
                <input type="password" class="form-control custom-input" formControlName="password"
                  placeholder="Enter password">
              </div>

              <!-- Remember -->
              <div class="form-check mb-3 small">
                <input class="form-check-input" type="checkbox" formControlName="remember">
                <label class="form-check-label">
                  Remember me
                </label>
              </div>

              <!-- Button -->
              <button type="submit" class="btn btn-primary w-100 rounded-3">
                Login
              </button>

            </form>

          </div>
        </div>

      </div>

    </div>
  </div>

</div>
