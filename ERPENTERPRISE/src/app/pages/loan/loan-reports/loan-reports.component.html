<div class="invoice-container card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Loan Reports</h5>
      <small class="opacity-75">Enterprise ERP System</small>
    </div>
    <div class="text-end small">
      <div>Date: {{ today | date:'dd-MM-yyyy' }}</div>
    </div>
  </div>

  <div class="card-body p-4 small">

    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="card bg-light border-0 shadow-sm h-100 p-3">
          <div class="text-secondary small fw-semibold text-uppercase">Approved Loans</div>
          <h3 class="mt-2 text-dark">{{ totalLoans }}</h3>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card bg-light border-0 shadow-sm h-100 p-3">
          <div class="text-secondary small fw-semibold text-uppercase">Pending Applications</div>
          <h3 class="mt-2 text-warning">{{ totalPending }}</h3>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card bg-light border-0 shadow-sm h-100 p-3">
          <div class="text-secondary small fw-semibold text-uppercase">Total Disbursed</div>
          <h3 class="mt-2 text-success">₹ {{ totalDisbursed | number:'1.2-2' }}</h3>
        </div>
      </div>
    </div>

    <div class="text-end">
      <button class="btn btn-sm btn-dark" (click)="generateReport()">Refresh Report</button>
    </div>

  </div>
</div>
