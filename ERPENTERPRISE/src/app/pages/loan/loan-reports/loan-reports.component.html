<div class="invoice-container card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Loan Reports</h5>
      <small class="opacity-75">Enterprise ERP System</small>
    </div>
    <div class="text-end small">
      <div>Date: {{ today | date:'dd-MM-yyyy' }}</div>
    </div>
  </div>

  <div class="card-body p-4 small">

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold small">From Date</label>
        <input type="date" class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">To Date</label>
        <input type="date" class="form-control form-control-sm">
      </div>

      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-sm btn-dark w-100">Generate Report</button>
      </div>
    </div>

  </div>
</div>
