<div class="invoice-container card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">EMI Schedule</h5>
      <small class="opacity-75">Enterprise ERP System</small>
    </div>
    <div class="text-end small">
      <div class="fw-semibold">Loan ID: LN-001</div>
      <div>Date: {{ today | date:'dd-MM-yyyy' }}</div>
    </div>
  </div>

  <div class="card-body p-4 small">

      <table class="table table-sm table-hover align-middle">

            <th>#</th>
            <th>Due Date</th>
            <th class="text-end">Principal</th>
            <th class="text-end">Interest</th>
            <th class="text-end">EMI</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>01-05-2026</td>
            <td class="text-end">₹ 5,000</td>
            <td class="text-end">₹ 500</td>
            <td class="text-end fw-semibold">₹ 5,500</td>
            <td><span class="badge bg-warning">Pending</span></td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
