<div class="invoice-container card shadow-sm border-0">

  <!-- HEADER -->
  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Loan Application</h5>
      <small class="opacity-75">Enterprise ERP System</small>
    </div>
    <div class="text-end small">
      <div class="fw-semibold">Application #: LA-001</div>
      <div>Date: {{ today | date:'dd-MM-yyyy' }}</div>
    </div>
  </div>

  <div class="card-body p-4 small">

    <!-- CUSTOMER SECTION -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Applicant Name *</label>
        <input type="text" [(ngModel)]="loan.applicantName" class="form-control form-control-sm" placeholder="Enter Full Name">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Loan Type</label>
        <select class="form-select form-select-sm">
          <option>Personal</option>
          <option>Business</option>
          <option>Gold</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Tenure (Months) *</label>
        <input type="number" [(ngModel)]="loan.tenureMonths" class="form-control form-control-sm">
      </div>
    </div>

    <!-- LOAN DETAILS -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Loan Amount *</label>
        <input type="number" [(ngModel)]="loan.principalAmount" class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Interest % (Annual) *</label>
        <input type="number" [(ngModel)]="loan.interestRate" class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Processing Fee</label>
        <input type="number" class="form-control form-control-sm">
      </div>
    </div>

    <!-- SUMMARY SECTION -->
    <div class="row justify-content-end">
      <div class="col-md-4">

        <div class="summary-box p-3 rounded bg-light border">

          <div class="d-flex justify-content-between mb-2">
            <span>Total Interest</span>
            <span>₹ {{ totalInterest | number:'1.2-2' }}</span>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Processing Fee</span>
            <span>₹ 0.00</span>
          </div>

          <hr class="my-2">

          <div class="d-flex justify-content-between fw-semibold">
            <span>Total Payable</span>
            <span class="text-dark">₹ {{ totalPayable | number:'1.2-2' }}</span>
          </div>

        </div>

      </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="mt-4 text-end">
      <button class="btn btn-sm btn-outline-secondary me-2">
        Cancel
      </button>
      <button class="btn btn-sm btn-success" (click)="save()">
        Submit Application
      </button>
    </div>

  </div>
</div>
