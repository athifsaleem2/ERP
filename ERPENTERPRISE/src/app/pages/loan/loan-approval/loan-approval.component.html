<div class="invoice-container card shadow-sm border-0">

  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Loan Approval</h5>
      <small class="opacity-75">Enterprise ERP System</small>
    </div>
    <div class="text-end small">
      <div class="fw-semibold">Ref #: LA-001</div>
      <div>Date: {{ today | date:'dd-MM-yyyy' }}</div>
    </div>
  </div>

  <div class="card-body p-4 small">

    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Application ID</label>
        <input class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Customer Name</label>
        <input class="form-control form-control-sm">
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Loan Amount</label>
        <input class="form-control form-control-sm">
      </div>
    </div>

    <div class="text-end">
      <button class="btn btn-sm btn-outline-danger me-2">Reject</button>
      <button class="btn btn-sm btn-success">Approve</button>
    </div>

  </div>
</div>
