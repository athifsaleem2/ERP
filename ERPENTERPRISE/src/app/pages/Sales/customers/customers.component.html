<div class="max-w-7xl mx-auto p-3 sm:p-3 lg:p-3">
  <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-xl">

    <!-- HEADER -->

      <div class="absolute top-0 right-0 -mr-10 -mt-20 w-64 h-64 rounded-full bg-white opacity-5 blur-3xl"></div>
      <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-48 h-48 rounded-full bg-teal-500 opacity-10 blur-2xl"></div>
      <div class="relative z-10">
        <h2 class="text-xl font-bold tracking-tight mb-0.5">Customer Management</h2>
        <p class="text-slate-300 text-xs font-medium tracking-wide">Manage & Monitor Customers</p>
      </div>
      <div class="relative z-10 w-full sm:w-auto">
        <button class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 bg-white bg-opacity-10 hover:bg-opacity-20 backdrop-blur-md border border-white border-opacity-40 rounded-lg text-white text-xs font-semibold transition-all duration-200 shadow-sm hover:shadow focus:outline-none">
          <svg class="mr-1.5 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Add Customer

      </div>
    </div>

    <div class="p-3">

      <!-- SEARCH SECTION -->
      <div class="flex flex-col md:flex-row gap-2 mb-2 bg-gray-50 p-2 rounded-md border border-gray-100">

          </div>
          <input type="text" class="w-full pl-9 pr-4 py-1 text-xs rounded border border-gray-300 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-shadow shadow-sm" placeholder="Search by Name, Phone, or Email...">
        </div>
        <div class="w-full md:w-44 relative">
          <select class="w-full appearance-none rounded border border-gray-300 px-3 py-1 text-xs bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-shadow shadow-sm cursor-pointer">
            <option value="all">All Customers</option>
            <option value="active">Active Status</option>
            <option value="inactive">Inactive Status</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
        <div class="w-full md:w-28">

        </div>
      </div>

        <div class="overflow-x-auto">

            <thead class="bg-gray-50">
              <tr>
                <th scope="col" class="px-3 py-2 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Customer Info</th>
                <th scope="col" class="px-3 py-2 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Contact</th>
                <th scope="col" class="px-3 py-2 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>

            </thead>
            <tbody class="bg-white divide-y divide-gray-100">

                </td>
                <td class="px-3 py-2 whitespace-nowrap text-right text-sm font-medium">
                  <div class="flex justify-end space-x-1.5 opacity-70 group-hover:opacity-100 transition-opacity">

                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>

                  </div>
                </td>
              </tr>
              <tr class="hover:bg-teal-50/30 transition-colors duration-150 group">
                <td class="px-3 py-2 whitespace-nowrap">
                  <div class="flex items-center">
                    <div class="flex-shrink-0 h-8 w-8 flex items-center justify-center rounded-full bg-blue-100 text-blue-700 font-bold text-xs shadow-sm ring-2 ring-white">GW</div>
                    <div class="ml-3">
                      <div class="text-xs font-bold text-gray-900">George Washington</div>
                      <div class="text-xs text-gray-400">ID: CUST-002</div>
                    </div>
                  </div>
                </td>
                <td class="px-3 py-2 whitespace-nowrap">
                  <div class="text-xs text-gray-900 flex items-center mb-0.5">
                    <svg class="mr-1 h-3 w-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    555-0198
                  </div>
                  <div class="text-xs text-gray-400 flex items-center">
                    <svg class="mr-1 h-3 w-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    george&#64;example.com

                <td class="px-3 py-2 whitespace-nowrap text-center">
                  <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 border border-red-200">
                    <span class="w-1.5 h-1.5 mr-1 bg-red-500 rounded-full"></span>Inactive

                </td>
                <td class="px-3 py-2 whitespace-nowrap text-right text-sm font-medium">
                  <div class="flex justify-end space-x-1.5 opacity-70 group-hover:opacity-100 transition-opacity">
                    <button class="p-1.5 text-indigo-600 hover:text-indigo-900 bg-indigo-50 hover:bg-indigo-100 rounded-lg transition-colors" title="Edit">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </button>
                    <button class="p-1.5 text-red-600 hover:text-red-900 bg-red-50 hover:bg-red-100 rounded-lg transition-colors" title="Delete">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="bg-white px-4 py-1.5 flex items-center justify-between border-t border-gray-200">
          <p class="text-xs text-gray-600">Showing <span class="font-medium">1</span> to <span class="font-medium">2</span> of <span class="font-medium">2</span> results</p>
