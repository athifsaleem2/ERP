<div class="max-w-full mx-auto p-3">
  <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-xl">
    <!-- Header -->
    <div class="bg-gradient-to-r from-slate-800 to-indigo-950 text-white px-6 py-4 flex justify-between items-center relative overflow-hidden">
      <div class="absolute top-0 right-0 -mr-16 -mt-16 w-48 h-48 rounded-full bg-white opacity-5 blur-2xl"></div>
      <div class="relative z-10">
        <h2 class="text-xl font-bold tracking-tight mb-0.5">Add New Customer</h2>
        <p class="text-slate-300 text-xs font-medium tracking-wide">Create a new business contact</p>
      </div>
      <div class="relative z-10">
        <button (click)="cancel()" 
          class="px-3 py-1.5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all flex items-center gap-2">
          <i class="bi bi-arrow-left"></i> Back to List
        </button>
      </div>
    </div>

    <!-- Form Body -->
    <div class="p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Primary Info -->
        <div class="space-y-4">
          <h3 class="text-[11px] font-bold text-indigo-600 uppercase tracking-widest border-b border-indigo-50 pb-1.5">Basic Information</h3>
          
          <div class="grid grid-cols-1 gap-4">
            <div class="space-y-1">
              <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ps-1">Full Name *</label>
              <input type="text" [(ngModel)]="customer.name" placeholder="Enter customer name" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ps-1">Phone Number *</label>
              <input type="text" [(ngModel)]="customer.phone" placeholder="Contact number" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ps-1">Email Address</label>
              <input type="email" [(ngModel)]="customer.email" placeholder="email@example.com" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
          </div>
        </div>

        <!-- Business Details -->
        <div class="space-y-4">
          <h3 class="text-[11px] font-bold text-indigo-600 uppercase tracking-widest border-b border-indigo-50 pb-1.5">Location & Tax</h3>

          <div class="grid grid-cols-1 gap-4">
            <div class="space-y-1">
              <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ps-1">GST Number</label>
              <input type="text" [(ngModel)]="customer.gstNumber" placeholder="GSTIN-00AAAAA0000A0Z0" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all uppercase">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ps-1">City</label>
              <input type="text" [(ngModel)]="customer.city" placeholder="City name" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-1">
              <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider ps-1">Full Address</label>
              <textarea rows="1" [(ngModel)]="customer.address" placeholder="Residential or Office address" 
                class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="mt-8 flex justify-end gap-3 border-t border-gray-100 pt-6">
        <button (click)="cancel()" 
          class="px-4 py-2 text-[10px] font-bold text-gray-500 hover:text-gray-700 transition-colors uppercase tracking-widest">
          Cancel
        </button>
        <button (click)="saveCustomer()" 
          class="px-6 py-2 bg-indigo-600 text-white rounded-lg text-[10px] font-bold hover:bg-indigo-700 transition-all shadow-md active:scale-95 uppercase tracking-widest flex items-center gap-2">
          <i class="bi bi-check2-circle"></i> Save Customer
        </button>
      </div>
    </div>
  </div>
</div>
