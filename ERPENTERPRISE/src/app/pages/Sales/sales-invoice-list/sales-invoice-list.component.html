<div class="max-w-full mx-auto p-3">
  <!-- INVOICE LIST SECTION -->
  <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-xl">
    <div class="bg-gradient-to-r from-slate-800 to-indigo-950 text-white px-6 py-4 flex justify-between items-center relative overflow-hidden">
      <div class="absolute top-0 right-0 -mr-16 -mt-16 w-48 h-48 rounded-full bg-white opacity-5 blur-2xl"></div>
      <div class="relative z-10">
        <h2 class="text-xl font-bold tracking-tight mb-0.5">Sales Invoices</h2>
        <p class="text-slate-300 text-xs font-medium tracking-wide">Manage and view all your sales records</p>
      </div>
      <button (click)="navigateToAdd()" 
        class="relative z-10 px-4 py-2 bg-white text-indigo-900 rounded-lg text-xs font-bold hover:bg-indigo-50 transition-all duration-200 shadow-md flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Add New Invoice
      </button>
    </div>

    <div class="p-4">
      <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Invoice #</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Customer</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Due Date</th>
              <th scope="col" class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Grand Total</th>
              <th scope="col" class="px-6 py-3 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
              <th scope="col" class="px-6 py-3 text-center text-xs font-bold text-gray-500 uppercase tracking-wider w-20">Actions</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-100">
            <tr *ngFor="let item of invoices" class="hover:bg-indigo-50/30 transition-colors duration-150">
              <td class="px-6 py-4 whitespace-nowrap text-xs font-bold text-indigo-600">{{ item.invoiceNumber }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-xs font-semibold text-gray-800">{{ item.customerName }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-xs text-gray-600">{{ item.dueDate }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-xs font-black text-right text-indigo-700">₹ {{ item.grandTotal | number:'1.2-2' }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-center">
                <span class="px-2.5 py-1 text-[10px] font-bold uppercase rounded-full bg-green-100 text-green-700 border border-green-200">Saved</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-center">
                <button class="text-indigo-600 hover:text-indigo-900 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
                </button>
              </td>
            </tr>
            <tr *ngIf="invoices.length === 0">
              <td colspan="6" class="px-6 py-12 text-center text-gray-400">
                <div class="flex flex-col items-center gap-2">
                  <svg class="w-10 h-10 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                  </svg>
                  <span class="text-sm">No sales invoices found.</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
