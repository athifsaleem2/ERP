<div class="max-w-7xl mx-auto p-3 sm:p-3 lg:p-3">
  <div class="bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden transition-all duration-300 hover:shadow-xl">

    <!-- HEADER -->
    <div class="bg-gradient-to-r from-slate-800 to-rose-950 text-white px-6 py-4 flex justify-between items-center relative overflow-hidden">
      <div class="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-white opacity-5 blur-3xl"></div>
      <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-48 h-48 rounded-full bg-rose-500 opacity-10 blur-2xl"></div>
      <div class="relative z-10">
        <h2 class="text-xl font-bold tracking-tight mb-0.5">Sales Return</h2>
        <p class="text-slate-300 text-xs font-medium tracking-wide">Return Against Sales Invoice</p>
      </div>
      <div class="relative z-10 text-right">
        <div class="bg-white bg-opacity-10 backdrop-blur-md rounded px-3 py-1.5 border border-white border-opacity-20 inline-block mb-1 shadow-sm">
          <span class="text-base font-bold tracking-wider">SR-001</span>
        </div>
        <div class="text-rose-200 text-xs font-medium flex items-center justify-end gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          Date: {{ today | date:'dd-MM-yyyy' }}
        </div>
      </div>
    </div>

    <div class="p-3">

      <!-- RETURN INFO -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-2.5">
        <div class="group">
          <label class="block text-xs font-semibold text-gray-600 mb-1 transition-colors group-focus-within:text-rose-600">Invoice No</label>
          <input type="text" class="w-full rounded border border-gray-300 px-3 py-1 text-xs bg-gray-50 text-gray-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-rose-500 transition-all duration-200 shadow-sm" placeholder="Enter Invoice Number">
        </div>
        <div class="group">
          <label class="block text-xs font-semibold text-gray-600 mb-1 transition-colors group-focus-within:text-rose-600">Customer</label>
          <div class="relative">
            <select class="w-full appearance-none rounded border border-gray-300 px-3 py-1 text-xs bg-gray-50 text-gray-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-rose-500 transition-all duration-200 shadow-sm cursor-pointer">
              <option value="" disabled selected>Select Customer</option>
              <option>Acme Corp</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>
        <div class="group">
          <label class="block text-xs font-semibold text-gray-600 mb-1 transition-colors group-focus-within:text-rose-600">Return Reason</label>
          <div class="relative">
            <select class="w-full appearance-none rounded border border-gray-300 px-3 py-1 text-xs bg-gray-50 text-gray-900 focus:bg-white focus:outline-none focus:ring-2 focus:ring-rose-500 focus:border-rose-500 transition-all duration-200 shadow-sm cursor-pointer">
              <option>Damaged</option>
              <option>Wrong Item</option>
              <option>Expired</option>
              <option>Other</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>
      </div>

      <!-- ITEMS TABLE -->
      <div class="mb-2 rounded-md border border-gray-200 overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th scope="col" class="px-3 py-2 text-left text-xs font-bold text-gray-500 uppercase tracking-wider w-1/3">Product</th>
                <th scope="col" class="px-3 py-2 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Sold Qty</th>
                <th scope="col" class="px-3 py-2 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Return Qty</th>
                <th scope="col" class="px-3 py-2 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Price (₹)</th>
                <th scope="col" class="px-3 py-2 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Amount (₹)</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-100">
              <tr class="hover:bg-rose-50/30 transition-colors duration-150 group">
                <td class="px-4 py-1.5 whitespace-nowrap">
                  <input type="text" class="w-full rounded border-gray-300 px-2.5 py-1.5 text-xs focus:ring-2 focus:ring-rose-500 focus:border-rose-500 transition-all shadow-sm bg-gray-50 focus:bg-white border hover:border-rose-300" placeholder="Product Name">
                </td>
                <td class="px-4 py-1.5 whitespace-nowrap text-right text-xs text-gray-500">0</td>
                <td class="px-4 py-1.5 whitespace-nowrap">
                  <input type="number" class="w-full rounded border-gray-300 px-2.5 py-1.5 text-xs text-right focus:ring-2 focus:ring-rose-500 focus:border-rose-500 transition-all shadow-sm bg-gray-50 focus:bg-white border hover:border-rose-300" placeholder="0">
                </td>
                <td class="px-4 py-1.5 whitespace-nowrap text-right text-xs text-gray-500">0.00</td>
                <td class="px-4 py-1.5 whitespace-nowrap text-right text-xs font-semibold text-gray-800">0.00</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="flex justify-end pt-2 border-t border-gray-200 mt-4">
        <div class="w-full md:w-1/3">
          <div class="bg-gray-50 rounded-xl p-3 border border-gray-100 shadow-sm relative overflow-hidden">
            <div class="absolute top-0 right-0 w-12 h-12 bg-gradient-to-br from-rose-100 to-pink-50 rounded-bl-full opacity-50"></div>
            <div class="space-y-2.5 relative z-10">
              <div class="flex justify-between items-center text-xs font-medium text-gray-600"><span>Total Return Amount</span><span>₹ 0.00</span></div>
              <div class="flex justify-between items-center text-xs font-medium text-gray-600"><span>Adjustment</span><span>₹ 0.00</span></div>
              <div class="border-t border-gray-200 pt-2.5">
                <div class="flex justify-between items-center">
                  <span class="text-sm font-bold text-gray-800 uppercase tracking-widest">Refund Amount</span>
                  <span class="text-xl font-black text-rose-600">₹ 0.00</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="mt-3 flex justify-end gap-3 border-t border-gray-100 pt-3">
        <button class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-xs text-gray-700 font-medium hover:bg-gray-50 transition-all duration-200 focus:outline-none shadow-sm">Cancel</button>
        <button class="px-5 py-2 bg-gradient-to-r from-rose-500 to-pink-600 text-white rounded-lg text-xs font-bold hover:shadow-lg hover:from-rose-600 hover:to-pink-700 transition-all duration-300 transform hover:-translate-y-0.5 focus:outline-none shadow-md">Process Return</button>
      </div>

    </div>
  </div>
</div>
