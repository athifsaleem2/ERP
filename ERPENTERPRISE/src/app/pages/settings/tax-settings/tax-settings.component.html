<div class="card shadow-sm border-0">
  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Tax Settings</h5>
      <small>Manage Tax Rates & Rules</small>
    </div>
    <button class="btn btn-sm btn-light text-dark" (click)="openAddTaxRule()">
      + Add Tax Rule
    </button>
  </div>
  <div class="card-body p-4 small">
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <input class="form-control form-control-sm" placeholder="Search Tax Rules">
      </div>
      <div class="col-md-2">
        <button class="btn btn-sm btn-dark w-100">Search</button>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Tax Name</th>
            <th>Rate (%)</th>
            <th>Type</th>
            <th>Status</th>
            <th width="160" class="text-center">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="fw-semibold">VAT</td>
            <td>10.00</td>
            <td>Percentage</td>
            <td><span class="badge bg-success">Active</span></td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1">Edit</button>
            </td>
          </tr>
          <tr>
            <td class="fw-semibold">GST</td>
            <td>18.00</td>
            <td>Percentage</td>
            <td><span class="badge bg-secondary">Inactive</span></td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1">Edit</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
