<div class="card shadow-sm border-0">
  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Add New Role</h5>
      <small>Create a new access level role</small>
    </div>
    <button class="btn btn-sm btn-light text-dark" (click)="goBack()">
      <i class="bi bi-arrow-left"></i> Back to Roles
    </button>
  </div>
  <div class="card-body p-4 small">
    
    <div class="row g-4">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Role Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control form-control-sm" placeholder="e.g. Sales Manager">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Copy Permissions From</label>
        <select class="form-select form-select-sm">
          <option selected>Start from scratch</option>
          <option>Administrator</option>
          <option>Manager</option>
          <option>Staff</option>
        </select>
      </div>

      <div class="col-md-12">
        <label class="form-label fw-semibold">Description</label>
        <textarea class="form-control form-control-sm" rows="2" placeholder="Brief description of this role's purpose"></textarea>
      </div>
      
    </div>

    <!-- Example Permissions Grid Layout -->
    <div class="mt-4">
      <h6 class="fw-semibold border-bottom pb-2 mb-3">Module Permissions</h6>
      <div class="table-responsive">
        <table class="table table-sm table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>Module</th>
              <th class="text-center">View</th>
              <th class="text-center">Create</th>
              <th class="text-center">Edit</th>
              <th class="text-center">Delete</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="fw-medium">Sales</td>
              <td class="text-center"><input class="form-check-input" type="checkbox" checked></td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
            </tr>
            <tr>
              <td class="fw-medium">Inventory</td>
              <td class="text-center"><input class="form-check-input" type="checkbox" checked></td>
              <td class="text-center"><input class="form-check-input" type="checkbox" checked></td>
              <td class="text-center"><input class="form-check-input" type="checkbox" checked></td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
            </tr>
            <tr>
              <td class="fw-medium">HRMS</td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
              <td class="text-center"><input class="form-check-input" type="checkbox"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    
    <hr class="my-4">
    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-sm btn-secondary px-4" (click)="goBack()">Cancel</button>
      <button class="btn btn-sm btn-success px-4" (click)="goBack()">Save Role</button>
    </div>
    
  </div>
</div>
