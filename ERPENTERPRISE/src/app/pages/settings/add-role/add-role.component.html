<div class="settings-container">
  <div class="page-header">
    <div>
      <h3 class="page-title">Add New Role</h3>
      <p class="page-sub">Create a role and assign module permissions</p>
    </div>
    <button class="btn-secondary" (click)="cancel()">Back to Roles</button>
  </div>

  <div class="content-card" style="max-width: 800px; margin: 0 auto;">
    <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
    <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

    <form (ngSubmit)="save()">
      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label">Role Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="name" [(ngModel)]="form.name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Status</label>
          <select class="form-select" name="status" [(ngModel)]="form.status">
            <option>Active</option>
            <option>Inactive</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description" [(ngModel)]="form.description" rows="2"></textarea>
        </div>
        
        <div class="col-12 mt-4">
          <label class="form-label mb-3">Module Access Permissions</label>
          <div class="d-flex flex-wrap">
            <div 
              *ngFor="let mod of allModules" 
              class="module-chip" 
              [ngClass]="{'selected': isSelected(mod)}"
              (click)="toggleModule(mod)">
              {{ mod }}
            </div>
          </div>
          <p class="small text-muted mt-2">Click to toggle module access for this role.</p>
        </div>
      </div>
      
      <div class="mt-4 pt-3 border-top text-end">
        <button type="button" class="btn-secondary me-2" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="saving || !form.name">
          {{ saving ? 'Saving...' : 'Create Role' }}
        </button>
      </div>
    </form>
  </div>
</div>
