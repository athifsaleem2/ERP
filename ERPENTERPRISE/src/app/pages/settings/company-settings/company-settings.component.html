<div class="settings-container">
  <div class="page-header">
    <div>
      <h3 class="page-title">Company Settings</h3>
      <p class="page-sub">Manage global profile and preferences</p>
    </div>
    <button class="btn-primary" (click)="save()" [disabled]="saving || !form.companyName">
      {{ saving ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>

  <div class="content-card" style="max-width: 900px; margin: 0 auto;">
    <div *ngIf="loading" class="text-center py-4 text-muted">Loading settings...</div>
    <div *ngIf="!loading">
      
      <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
      <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

      <div class="row g-4 mb-4">
        <h5 class="col-12 mb-0 border-bottom pb-2">Business Profile</h5>
        
        <div class="col-md-6">
          <label class="form-label">Company Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="form.companyName">
        </div>
        <div class="col-md-6">
          <label class="form-label">Tax / GST Number</label>
          <input type="text" class="form-control" [(ngModel)]="form.taxNumber">
        </div>
        <div class="col-12">
          <label class="form-label">Official Address</label>
          <textarea class="form-control" [(ngModel)]="form.address" rows="2"></textarea>
        </div>
        <div class="col-md-4">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" [(ngModel)]="form.phone">
        </div>
        <div class="col-md-4">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="form.email">
        </div>
        <div class="col-md-4">
          <label class="form-label">Website</label>
          <input type="text" class="form-control" [(ngModel)]="form.website">
        </div>
      </div>

      <div class="row g-4 mb-3">
        <h5 class="col-12 mb-0 border-bottom pb-2 mt-2">Localization</h5>
        
        <div class="col-md-4">
          <label class="form-label">Currency</label>
          <select class="form-select" [(ngModel)]="form.currency" (change)="onCurrencyChange()">
            <option *ngFor="let c of currencies" [value]="c.code">{{ c.code }} ({{ c.symbol }})</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Currency Symbol</label>
          <input type="text" class="form-control" [(ngModel)]="form.currencySymbol" readonly>
        </div>
        <div class="col-md-4">
          <label class="form-label">Date Format</label>
          <select class="form-select" [(ngModel)]="form.dateFormat">
            <option *ngFor="let d of dateFormats" [value]="d">{{ d }}</option>
          </select>
        </div>
      </div>

    </div>
  </div>
</div>
