<div class="card shadow-sm border-0">
  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Company Settings</h5>
      <small>Manage Global Preferences</small>
    </div>
  </div>
  <div class="card-body p-4 small">
    
    <div class="row g-4">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Company Name</label>
        <input type="text" class="form-control form-control-sm" value="My Enterprise ERP">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Contact Email</label>
        <input type="email" class="form-control form-control-sm" value="contact@myenterprise.com">
      </div>
      
      <div class="col-md-12">
        <label class="form-label fw-semibold">Address</label>
        <textarea class="form-control form-control-sm" rows="3">123 Business Road, Corporate City</textarea>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Currency</label>
        <select class="form-select form-select-sm">
          <option selected>USD ($)</option>
          <option>EUR (€)</option>
          <option>INR (₹)</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Timezone</label>
        <select class="form-select form-select-sm">
          <option selected>UTC+00:00 (GMT)</option>
          <option>UTC+05:30 (IST)</option>
        </select>
      </div>
    </div>
    
    <hr class="my-4">
    <div class="d-flex justify-content-end">
      <button class="btn btn-sm btn-success px-4">Save Changes</button>
    </div>
    
  </div>
</div>
