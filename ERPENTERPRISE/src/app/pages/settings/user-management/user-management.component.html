<div class="settings-container">
  <div class="page-header">
    <div>
      <h3 class="page-title">User Management</h3>
      <p class="page-sub">Manage system users and access levels</p>
    </div>
    <button class="btn-primary" (click)="addUser()">+ Add New User</button>
  </div>

  <div class="content-card">
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <input type="text" class="form-control" placeholder="Search by name or email..." [(ngModel)]="searchTerm">
      </div>
      <div class="col-md-8 text-end align-self-center">
        <span class="text-muted small me-3">Total Users: {{ users.length }}</span>
        <span class="text-muted small">Admins: {{ adminCount }}</span>
      </div>
    </div>

    <div *ngIf="loading" class="text-center py-4 text-muted">Loading users...</div>
    <div *ngIf="!loading && filtered.length === 0" class="text-center py-4 text-muted">No users found</div>

    <table class="table" *ngIf="filtered.length > 0">
      <thead>
        <tr>
          <th>User Info</th>
          <th>Username</th>
          <th>Role</th>
          <th>Joined</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of filtered">
          <td>
            <div class="fw-bold">{{ u.fullName || '—' }}</div>
            <div class="small text-muted">{{ u.email || '—' }}</div>
          </td>
          <td class="fw-medium">&#64;{{ u.username }}</td>
          <td><span class="badge bg-{{ roleColor(u.role) }}">{{ u.role }}</span></td>
          <td class="text-muted">{{ u.createdAt | date:'MMM yyyy' }}</td>
          <td class="text-end">
            <button class="btn-action btn-edit me-2" title="Edit" (click)="edit(u.id)"><i class="fa fa-pen"></i> Edit</button>
            <button class="btn-action btn-delete" title="Delete" (click)="delete(u.id)"><i class="fa fa-trash"></i> Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
