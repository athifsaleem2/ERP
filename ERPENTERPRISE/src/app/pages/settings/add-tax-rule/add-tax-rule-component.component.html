<div class="settings-container">
  <div class="page-header">
    <div>
      <h3 class="page-title">Add Tax Rule</h3>
      <p class="page-sub">Configure a new tax rate rule</p>
    </div>
    <button class="btn-secondary" (click)="cancel()">Back to Taxes</button>
  </div>

  <div class="content-card" style="max-width: 800px; margin: 0 auto;">
    <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
    <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

    <form (ngSubmit)="save()">
      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label">Rule Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="ruleName" [(ngModel)]="form.ruleName" placeholder="e.g. GST 18%" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Status</label>
          <select class="form-select" name="status" [(ngModel)]="form.status">
            <option>Active</option>
            <option>Inactive</option>
          </select>
        </div>
        
        <div class="col-md-4">
          <label class="form-label">Applies To</label>
          <select class="form-select" name="appliesTo" [(ngModel)]="form.appliesTo">
            <option *ngFor="let a of appliesTo" [value]="a">{{ a }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Tax Type</label>
          <select class="form-select" name="taxType" [(ngModel)]="form.taxType">
            <option *ngFor="let t of taxTypes" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Rate / Value <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="number" class="form-control" name="taxPercentage" [(ngModel)]="form.taxPercentage" required>
            <span class="input-group-text">{{ form.taxType === 'Percentage' ? '%' : '₹' }}</span>
          </div>
        </div>

        <div class="col-12 mt-4"><hr></div>
        <div class="col-12"><p class="form-label text-muted mb-0">Payroll Specific Options (Leave blank for standard tax)</p></div>
        
        <div class="col-md-6">
          <label class="form-label">Min Salary Bracket (₹)</label>
          <input type="number" class="form-control" name="minSalary" [(ngModel)]="form.minSalary">
        </div>
        <div class="col-md-6">
          <label class="form-label">Max Salary Bracket (₹)</label>
          <input type="number" class="form-control" name="maxSalary" [(ngModel)]="form.maxSalary">
        </div>
      </div>
      
      <div class="mt-4 pt-3 border-top text-end">
        <button type="button" class="btn-secondary me-2" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="saving || !form.ruleName">
          {{ saving ? 'Saving...' : 'Create Tax Rule' }}
        </button>
      </div>
    </form>
  </div>
</div>
