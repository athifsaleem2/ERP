<div class="card shadow-sm border-0">
  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Roles & Permissions</h5>
      <small>Manage Access Control</small>
    </div>
    <button class="btn btn-sm btn-light text-dark" (click)="addRole()">
      + Add Role
    </button>
  </div>
  <div class="card-body p-4 small">
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <input class="form-control form-control-sm" placeholder="Search Roles">
      </div>
      <div class="col-md-2">
        <button class="btn btn-sm btn-dark w-100">Search</button>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Role Name</th>
            <th>Description</th>
            <th>Total Users</th>
            <th width="160" class="text-center">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="fw-semibold">Administrator</td>
            <td>Full system access</td>
            <td>1</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1">Edit</button>
            </td>
          </tr>
          <tr>
            <td class="fw-semibold">Manager</td>
            <td>Access to module management</td>
            <td>4</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1">Edit</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
