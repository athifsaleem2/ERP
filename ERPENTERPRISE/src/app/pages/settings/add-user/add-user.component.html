<div class="settings-container">
  <div class="page-header">
    <div>
      <h3 class="page-title">{{ isEditMode ? 'Edit User' : 'Add New User' }}</h3>
      <p class="page-sub">{{ isEditMode ? 'Update existing user profile' : 'Create a new system user profile' }}</p>
    </div>
    <button class="btn-secondary" (click)="cancel()">Back to Users</button>
  </div>

  <div class="content-card" style="max-width: 800px; margin: 0 auto;">
    <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
    <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

    <form (ngSubmit)="save()">
      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" name="fullName" [(ngModel)]="form.fullName">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" name="email" [(ngModel)]="form.email">
        </div>
        
        <div class="col-md-6">
          <label class="form-label">Username <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="username" [(ngModel)]="form.username" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Password <span *ngIf="!isEditMode" class="text-danger">*</span></label>
          <input type="password" class="form-control" name="password" [(ngModel)]="form.password" [required]="!isEditMode" [placeholder]="isEditMode ? 'Leave blank to keep current' : ''">
        </div>

        <div class="col-md-6">
          <label class="form-label">User Role</label>
          <select class="form-select" name="role" [(ngModel)]="form.role">
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </div>
      </div>
      
      <div class="mt-4 pt-3 border-top text-end">
        <button type="button" class="btn-secondary me-2" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="saving || !form.username || (!isEditMode && !form.password)">
          {{ saving ? 'Saving...' : (isEditMode ? 'Update User' : 'Create User') }}
        </button>
      </div>
    </form>
  </div>
</div>
