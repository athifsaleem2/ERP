<div class="card shadow-sm border-0">
  <div class="card-header gradient-header text-white py-3 d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-0 fw-semibold">Add New User</h5>
      <small>Create a new system user profile</small>
    </div>
    <button class="btn btn-sm btn-light text-dark" (click)="goBack()">
      <i class="bi bi-arrow-left"></i> Back to Users
    </button>
  </div>
  <div class="card-body p-4 small">
    
    <div class="row g-4">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" class="form-control form-control-sm" placeholder="Enter full name">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" class="form-control form-control-sm" placeholder="Enter email address">
      </div>
      
      <div class="col-md-6">
        <label class="form-label fw-semibold">Role</label>
        <select class="form-select form-select-sm">
          <option selected disabled>Select Role</option>
          <option>Administrator</option>
          <option>Manager</option>
          <option>Staff</option>
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control form-control-sm" placeholder="Enter temporary password">
      </div>
    </div>
    
    <hr class="my-4">
    <div class="d-flex justify-content-end gap-2">
      <button class="btn btn-sm btn-secondary px-4" (click)="goBack()">Cancel</button>
      <button class="btn btn-sm btn-success px-4" (click)="goBack()">Save User</button>
    </div>
    
  </div>
</div>
