<div class="relative overflow-hidden bg-white rounded-2xl shadow-2xl border border-gray-100 min-h-[600px] flex flex-col md:flex-row">
  
  <!-- DECORATIVE BACKGROUND (Left panel) -->
  <div class="absolute top-0 right-0 w-64 h-64 bg-violet-50 rounded-full blur-3xl opacity-40 -mr-20 -mt-20 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-48 h-48 bg-purple-50 rounded-full blur-3xl opacity-30 -ml-10 -mb-10 pointer-events-none"></div>

  <!-- LEFT: FORM SECTION -->
  <div class="w-full md:w-1/3 bg-gradient-to-br from-violet-800 to-purple-900 text-white p-8 md:p-10 relative overflow-hidden flex flex-col">
    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10 pointer-events-none"></div>
    <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-white opacity-5 rounded-full blur-3xl pointer-events-none"></div>
    
    <div class="relative z-10 mb-8">
      <h2 class="text-3xl font-black tracking-tight flex items-center gap-3">
        <svg class="w-8 h-8 text-violet-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
        Categories
      </h2>
      <div class="h-1.5 w-16 bg-violet-400 rounded-full mt-3 opacity-90"></div>
      <p class="text-violet-200 text-xs mt-3 font-medium tracking-wide">Create and manage top-level groups to organize inventory items smoothly.</p>
    </div>

    <!-- FORM -->
    <div class="relative z-10 flex-grow flex flex-col justify-center">
      <div class="space-y-5">
        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-violet-200 uppercase tracking-widest ml-1">Category Name *</label>
          <div class="relative">
            <input type="text" [(ngModel)]="category.name"
                   class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-sm text-white placeholder-violet-300/50 focus:ring-2 focus:ring-violet-400 focus:border-violet-400 transition-all outline-none backdrop-blur-sm" 
                   placeholder="e.g. Electronics, Raw Materials">
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-violet-200 uppercase tracking-widest ml-1">Description *</label>
          <div class="relative">
            <textarea [(ngModel)]="category.description"
                   class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-sm text-white placeholder-violet-300/50 focus:ring-2 focus:ring-violet-400 focus:border-violet-400 transition-all outline-none backdrop-blur-sm resize-none h-28" 
                   placeholder="Brief details about what goes in this category..."></textarea>
          </div>
        </div>

        <button (click)="addCategory()" [disabled]="!category.name || !category.description || isSaving"
                class="w-full mt-4 bg-white text-violet-900 font-black text-xs uppercase tracking-widest py-3.5 rounded-xl shadow-lg shadow-violet-900/50 hover:bg-violet-50 hover:scale-[1.02] transform transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isSaving ? 'Saving...' : 'Add Category' }}
        </button>
      </div>
    </div>
  </div>

  <!-- RIGHT: LIST SECTION -->
  <div class="w-full md:w-2/3 p-6 md:p-10 relative z-10 bg-gray-50/50">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-lg font-bold text-gray-800 tracking-tight">Active Categories</h3>
      <span class="bg-violet-100 text-violet-700 text-xs font-black px-3 py-1 rounded-full">{{ categories.length }} Total</span>
    </div>

    <!-- SPINNER -->
    <div *ngIf="isLoading" class="flex justify-center items-center h-64">
       <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-violet-700"></div>
    </div>

    <!-- CARDS GRID -->
    <div *ngIf="!isLoading" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div *ngFor="let cat of categories" class="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-300 group">
        <div class="flex justify-between items-start mb-3">
          <div class="w-10 h-10 rounded-full bg-violet-50 text-violet-600 flex items-center justify-center group-hover:scale-110 transition-transform">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
          </div>
          <button (click)="deleteCategory(cat.id)" class="text-gray-300 hover:text-red-500 transition-colors bg-gray-50 hover:bg-red-50 p-1.5 rounded-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
        
        <h4 class="text-sm font-bold text-gray-900 mb-1 tracking-tight">{{ cat.name }}</h4>
        <p class="text-xs text-gray-500 line-clamp-2 mb-4 h-8">{{ cat.description }}</p>
        
        <div class="flex items-center justify-between pt-3 border-t border-gray-50">
           <div class="flex items-center gap-1.5 text-violet-600">
             <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
             <span class="text-[10px] font-black uppercase tracking-wider">{{ cat.itemCount }} Items</span>
           </div>
           
           <span class="text-[9px] font-bold text-gray-400 tracking-wider">ID: #{{ cat.id | number:'3.0-0' }}</span>
        </div>
      </div>

      <!-- EMPTY STATE -->
      <div *ngIf="categories.length === 0" class="col-span-1 sm:col-span-2 py-16 flex flex-col items-center justify-center text-center">
        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-3">
          <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
        </div>
        <p class="text-sm font-bold text-gray-500">No categories found</p>
        <p class="text-xs text-gray-400 mt-1">Use the form on the left to add one.</p>
      </div>

    </div>
  </div>
</div>
