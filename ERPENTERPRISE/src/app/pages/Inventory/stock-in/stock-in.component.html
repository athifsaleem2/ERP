<div class="relative overflow-hidden bg-white rounded-2xl shadow-2xl border border-gray-100 min-h-[600px] flex flex-col md:flex-row">
  
  <div class="absolute top-0 right-0 w-64 h-64 bg-emerald-50 rounded-full blur-3xl opacity-40 -mr-20 -mt-20 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-48 h-48 bg-teal-50 rounded-full blur-3xl opacity-30 -ml-10 -mb-10 pointer-events-none"></div>

  <!-- LEFT: FORM SECTION -->
  <div class="w-full md:w-1/2 p-8 md:p-10 relative z-10 bg-white">
    
    <div class="mb-8">
      <h2 class="text-3xl font-black text-gray-900 tracking-tight flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>
        </div>
        Stock Check-In
      </h2>
      <p class="text-gray-500 text-xs mt-3 font-medium tracking-wide">Record incoming goods, set quantities, and link to suppliers securely.</p>
    </div>

    <!-- FORM -->
    <div class="space-y-5">
      
      <!-- Product Selection -->
      <div class="space-y-1.5">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Product *</label>
        <div class="relative">
          <select [(ngModel)]="entry.productId" (change)="onProductChange()"
                  class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all outline-none appearance-none cursor-pointer font-semibold text-gray-700">
            <option [ngValue]="0" disabled>Select Product</option>
            <option *ngFor="let p of products" [ngValue]="p.id">{{ p.name }} (SKU: {{ p.sku }})</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Quantity Received *</label>
          <div class="relative">
            <input type="number" [(ngModel)]="entry.quantity" min="1"
                   class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all outline-none font-black text-emerald-700 text-center">
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Date *</label>
          <input type="date" [(ngModel)]="entry.date"
                 class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-semibold text-gray-600 focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all outline-none">
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Supplier / Source *</label>
        <div class="relative">
          <select [(ngModel)]="entry.reference"
                  class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all outline-none appearance-none cursor-pointer text-gray-700">
            <option value="" disabled>Select Supplier</option>
            <option *ngFor="let s of suppliers" [value]="s.name">{{ s.name }}</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Destination Location</label>
        <input type="text" [(ngModel)]="entry.toLocation"
               class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all outline-none text-gray-600" 
               placeholder="e.g. Main Warehouse">
      </div>

      <button (click)="saveStockIn()" [disabled]="!entry.productId || entry.quantity <= 0 || !entry.reference || isSaving"
              class="w-full mt-2 bg-gradient-to-r from-emerald-600 to-teal-700 text-white font-black text-xs uppercase tracking-[0.1em] py-3.5 rounded-xl shadow-lg shadow-emerald-500/30 hover:shadow-emerald-500/50 hover:scale-[1.01] transform transition-all active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isSaving ? 'Processing...' : 'Confirm Stock Receipt' }}
      </button>

    </div>
  </div>

  <!-- RIGHT: RECENT ENTRIES -->
  <div class="w-full md:w-1/2 bg-gray-50/80 p-8 md:p-10 relative z-10 border-l border-gray-100 flex flex-col">
    
    <div class="flex items-center gap-2 mb-6">
      <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
      <h3 class="text-sm font-black text-gray-800 uppercase tracking-widest">Recent Inwards</h3>
    </div>

    <div class="flex-grow space-y-3">
      <!-- Cards -->
      <div *ngFor="let item of recentEntries" class="bg-white border border-gray-100 p-4 rounded-xl shadow-sm flex items-center justify-between group hover:border-emerald-200 transition-colors">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 font-black text-xs">
            +{{ item.quantity }}
          </div>
          <div>
            <h4 class="text-xs font-bold text-gray-900">{{ item.productName }}</h4>
            <p class="text-[10px] text-gray-400 mt-0.5">From: {{ item.reference }} &bull; {{ item.date | date:'mediumDate' }}</p>
          </div>
        </div>
        <div class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md uppercase tracking-wider">
          Completed
        </div>
      </div>

      <!-- Empty State -->
      <div *ngIf="recentEntries.length === 0" class="h-full flex flex-col justify-center items-center text-center opacity-50">
        <svg class="w-12 h-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        <p class="text-xs font-bold text-gray-500">No recent inwards shown</p>
      </div>
    </div>
  </div>
</div>
