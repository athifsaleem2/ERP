<div class="relative overflow-hidden bg-white rounded-2xl shadow-2xl border border-gray-100 min-h-[600px] flex flex-col md:flex-row">
  
  <div class="absolute top-0 right-0 w-64 h-64 bg-cyan-50 rounded-full blur-3xl opacity-40 -mr-20 -mt-20 pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-48 h-48 bg-blue-50 rounded-full blur-3xl opacity-30 -ml-10 -mb-10 pointer-events-none"></div>

  <!-- LEFT: FORM SECTION -->
  <div class="w-full md:w-1/2 p-8 md:p-10 relative z-10 bg-white border-r border-gray-100">
    
    <div class="mb-8">
      <h2 class="text-3xl font-black text-gray-900 tracking-tight flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-cyan-100 text-cyan-600 flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        </div>
        Stock Transfer
      </h2>
      <p class="text-gray-500 text-xs mt-3 font-medium tracking-wide">Move inventory seamlessly between different warehouses and retail locations.</p>
    </div>

    <!-- FORM -->
    <div class="space-y-5">
      
      <!-- Product Selection -->
      <div class="space-y-1.5">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Product to Transfer *</label>
        <div class="relative">
          <select [(ngModel)]="entry.productId" (change)="onProductChange()"
                  class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500 transition-all outline-none appearance-none cursor-pointer font-semibold text-gray-700">
            <option [ngValue]="0" disabled>Select Product</option>
            <option *ngFor="let p of products" [ngValue]="p.id">{{ p.name }} (SKU: {{ p.sku }})</option>
          </select>
          <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Quantity *</label>
          <div class="relative">
            <input type="number" [(ngModel)]="entry.quantity" min="1"
                   class="w-full bg-cyan-50/50 border border-cyan-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500 transition-all outline-none font-black text-cyan-700 text-center placeholder-cyan-300">
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Date *</label>
          <input type="date" [(ngModel)]="entry.date"
                 class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-semibold text-gray-600 focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500 transition-all outline-none">
        </div>
      </div>

      <!-- LOCATIONS TRANSFER WIDGET -->
      <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 mt-2 mb-2 relative">
         <div class="space-y-4">
           <!-- FROM -->
           <div class="space-y-1.5">
             <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 flex items-center gap-1">
               <span class="w-2 h-2 rounded-full bg-red-400"></span> From Source
             </label>
             <select [(ngModel)]="entry.fromLocation"
                     class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500 transition-all outline-none appearance-none font-medium">
               <option value="" disabled>Select Source</option>
               <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
             </select>
           </div>
           
           <!-- TO -->
           <div class="space-y-1.5">
             <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 flex items-center gap-1">
               <span class="w-2 h-2 rounded-full bg-green-400"></span> To Destination
             </label>
             <select [(ngModel)]="entry.toLocation"
                     class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-500 transition-all outline-none appearance-none font-medium">
               <option value="" disabled>Select Destination</option>
               <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
             </select>
           </div>
         </div>

         <!-- Swap Button -->
         <button (click)="swapLocations()" title="Swap Locations" class="absolute top-[49%] right-8 -translate-y-1/2 w-8 h-8 bg-white border border-gray-200 rounded-full flex items-center justify-center text-cyan-600 shadow-sm hover:shadow-md hover:bg-cyan-50 transition-all hover:scale-110 active:scale-95">
           <svg class="w-4 h-4 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
         </button>
      </div>

      <button (click)="saveStockTransfer()" [disabled]="!entry.productId || entry.quantity <= 0 || !entry.fromLocation || !entry.toLocation || isSaving"
              class="w-full mt-2 bg-gradient-to-r from-cyan-600 to-blue-700 text-white font-black text-xs uppercase tracking-[0.1em] py-3.5 rounded-xl shadow-lg shadow-cyan-500/30 hover:shadow-cyan-500/50 hover:scale-[1.01] transform transition-all active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isSaving ? 'Executing Transfer...' : 'Initiate Transfer' }}
      </button>

    </div>
  </div>

  <!-- RIGHT: RECENT ENTRIES -->
  <div class="w-full md:w-1/2 bg-gray-50/80 p-8 md:p-10 relative z-10 flex flex-col">
    
    <div class="flex items-center gap-2 mb-6">
      <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
      <h3 class="text-sm font-black text-gray-800 uppercase tracking-widest">Recent Transfers</h3>
    </div>

    <div class="flex-grow space-y-3 shadow-inner bg-gray-50/50 p-4 rounded-3xl overflow-hidden border border-gray-100/50">
      <!-- Cards -->
      <div *ngFor="let item of recentEntries" class="bg-white border border-gray-100 p-4 rounded-xl shadow-sm hover:shadow-md hover:border-cyan-200 transition-all relative overflow-hidden group">
        <!-- Decoration -->
        <div class="absolute right-0 top-0 h-full w-2 bg-cyan-100 group-hover:bg-cyan-400 transition-colors"></div>
        
        <div class="flex items-center gap-3 mb-2">
          <span class="text-[10px] font-black text-cyan-700 bg-cyan-50 px-2.5 py-0.5 rounded-full border border-cyan-100">
            {{ item.quantity }} Units
          </span>
          <h4 class="text-xs font-bold text-gray-900 truncate">{{ item.productName }}</h4>
        </div>
        
        <div class="flex items-center justify-between text-[10px] font-semibold text-gray-500 bg-gray-50 rounded-lg p-2 border border-gray-100">
           <div class="flex-1 truncate">{{ item.fromLocation }}</div>
           <svg class="w-3 h-3 text-cyan-400 flex-shrink-0 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
           <div class="flex-1 text-right truncate">{{ item.toLocation }}</div>
        </div>
        <div class="text-[9px] text-gray-400 mt-2 text-right tracking-wider">{{ item.date | date:'mediumDate' }}</div>
      </div>

      <!-- Empty State -->
      <div *ngIf="recentEntries.length === 0" class="h-full flex flex-col justify-center items-center text-center opacity-50 py-10">
        <svg class="w-12 h-12 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
        <p class="text-xs font-bold text-gray-500">No transfers logged yet</p>
      </div>
    </div>
  </div>
</div>
