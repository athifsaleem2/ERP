<div class="card shadow-sm border-0">

  <div class="card-header gradient-header text-white d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Inventory Report</h5>
    <button class="btn btn-light btn-sm" (click)="generateReport()">
      Generate Report
    </button>
  </div>

  <div class="card-body small">

    <div class="row g-3">

      <div class="col-md-4">
        <label>Product</label>
        <input class="form-control form-control-sm" [(ngModel)]="report.product">
      </div>

      <div class="col-md-4">
        <label>Category</label>
        <input class="form-control form-control-sm" [(ngModel)]="report.category">
      </div>

      <div class="col-md-4">
        <label>Stock Status</label>
        <select class="form-select form-select-sm" [(ngModel)]="report.stockStatus">
          <option>All</option>
          <option>Low Stock</option>
          <option>Out Of Stock</option>
        </select>
      </div>

    </div>

  </div>

</div>
